  experience_level: beginner
  notes: สัตว์เลี้ยงที่เหมาะกับมือใหม่ที่สุด — ราคาถูก เลี้ยงง่าย ใช้พื้นที่น้อย และอายุไม่นาน

care:
  grooming_frequency: ไม่ต้อง (อาบทราย)
  grooming_complexity: low
  feeding_frequency_per_day: 1
  special_diet_needs: false
  exercise_type: วงล้อวิ่ง อุโมงค์ ขุด
  common_health_issues:
    - Wet tail (ท้องร่วงรุนแรง)
    - เนื้องอก
    - ฟันยาว
  vet_visit_frequency: เฉพาะเมื่อป่วย

concerns:
  - id: lifespan
    title: อายุสั้น
    severity: moderate
    description: อายุเฉลี่ย 2-3 ปี — เหมาะสำหรับคนที่ยังไม่พร้อมรับผิดชอบระยะยาว แต่ต้องเตรียมใจกับความสูญเสียที่มาเร็ว
  - id: nocturnal
    title: ตื่นกลางคืน
    severity: minor
    description: วิ่งวงล้อตอนกลางคืน — ถ้ากรงอยู่ในห้องนอนจะรบกวนการนอน
  - id: solitary
    title: ต้องอยู่ตัวเดียว (Syrian)
    severity: moderate
    description: Syrian Hamster จะกัดกันตายถ้าอยู่รวม — ต้องแยกกรง

matching:
  trait_scores:
    budget_match: 10
