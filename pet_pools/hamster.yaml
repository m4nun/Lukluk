id: hamster
name: Pocket Rocket
species: small_mammal
breed_or_category: Hamster (Syrian/Dwarf)
description: สัตว์เลี้ยงตัวเล็กสุดคลาสสิก — Hamster น่ารัก ขี้สงสัย และเลี้ยงง่าย เหมาะกับมือใหม่ที่สุดในบรรดาสัตว์เลี้ยงทั้งหมด

mbti_label: ISFP — The Tiny Adventurer
mbti_traits:
  - ขี้สงสัย ชอบสำรวจ
  - น่ารัก น่ากอด (Syrian)
  - ตื่นกลางคืน
  - อยู่ตัวเดียวพอ
mbti_description: Hamster คือนักสำรวจตัวจิ๋ว — มันชอบวิ่งวงล้อ ขุดอุโมงค์ และเก็บอาหารไว้ในกระพุ้งแก้มจนฟู มันเป็นสัตว์เลี้ยงที่ใช้พื้นที่น้อยและเวลาไม่มาก

