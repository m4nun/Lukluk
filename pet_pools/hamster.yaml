    allergy_match: 10
    noise_match: 5
    travel_match: 10
    existing_pets_match: 1
    beginner_match: 10
    child_friendly: 6

agent_guidance:
  who_is_this_pet_for: มือใหม่สุด ๆ, เด็ก, คนอยู่หอพัก, คนที่ยังไม่พร้อมรับผิดชอบระยะยาว, คนอยากลองเลี้ยงสัตว์ดูก่อน — Hamster เป็น "สัตว์ทดลอง" ที่ดีที่สุด
  hidden_costs: กรงใหญ่ (ขั้นต่ำ 60x40 ซม.), วงล้อวิ่งขนาดเหมาะสม (วงล้อเล็กทำให้หลังคด), ทรายอาบ
  common_mistakes: เลี้ยงในกรงเล็กเกินไป, ใช้ขี้เลื่อยสน (เป็นพิษต่อ Hamster), เลี้ยง Syrian รวมกัน, จับแรง
  adoption_advice: Hamster อายุสั้น — รับจากฟาร์มหรือร้านที่ดูแลดี ไม่ใช่ร้านที่ขังรวมในกรงเล็ก
  decision_factors: รับได้ไหมที่อายุแค่ 2-3 ปี? พร้อมให้กรงใหญ่ (ไม่ใช่กรงเล็กที่ขายตามร้าน)? สมาชิกในบ้านรับเสียงวงล้อตอนกลางคืนได้ไหม?

