concerns:
  - id: pair_requirement
    title: ต้องเลี้ยงอย่างน้อย 2 ตัว
    severity: major
    description: Sugar Glider เป็นสัตว์สังคมที่ต้องการเพื่อน — เลี้ยงตัวเดียวจะเครียดและซึมเศร้า อาจกัดตัวเองจนตาย
  - id: nocturnal
    title: ตื่นกลางคืน
    severity: moderate
    description: เล่นและส่งเสียงตอนกลางคืน — ไม่เหมาะกับคนนอนไว
  - id: diet
    title: อาหารซับซ้อน
    severity: moderate
    description: ต้องการอาหารสมดุลเฉพาะ — ผลไม้ โปรตีน แคลเซียม — ผิดส่วนนิดเดียวจะป่วย

matching:
  trait_scores:
