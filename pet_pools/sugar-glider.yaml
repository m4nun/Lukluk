id: sugar-glider
name: Sugar Glider Ace
species: small_mammal
breed_or_category: Sugar Glider
description: สัตว์น้อยน่ารักผู้ร่อนได้ — Sugar Glider ติดเจ้าของมาก ขี้อ้อน และชอบเกาะตัวคุณทั้งวันทั้งคืน

mbti_label: ESFP — The Pocket Acrobat
mbti_traits:
  - ติดเจ้าของมาก
  - ขี้เล่นและร่อนเก่ง
  - ต้องการเพื่อน
  - ตื่นกลางคืน
mbti_description: Sugar Glider เป็นสัตว์สังคมตัวจ้อย — มันต้องการเพื่อน (ควรเลี้ยงคู่) และจะสร้าง bond ที่ลึกซึ้งกับเจ้าของ มันจะเกาะในกระเป๋าเสื้อคุณทั้งวันและเล่นตอนกลางคืน

