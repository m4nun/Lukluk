    space_match: 9
    allergy_match: 9
    noise_match: 5
    travel_match: 8
    existing_pets_match: 2
    beginner_match: 3
    child_friendly: 5

agent_guidance:
  who_is_this_pet_for: คนนอนดึก, คนชอบสัตว์ที่ติดเจ้าของแบบพกพาได้, คนพร้อมเลี้ยงอย่างน้อย 2 ตัว, คนที่สนุกกับการเตรียมอาหารพิเศษ
  hidden_costs: อาหารผลไม้สดและโปรตีนทุกวัน, กรงขนาดใหญ่, exotic vet, แคลเซียมและวิตามินเสริม
  common_mistakes: เลี้ยงตัวเดียว, ให้อาหารไม่สมดุล (ขาดแคลเซียม), เลี้ยงในกรงเล็ก, ไม่มีเวลาผูกพันจนกลายเป็นสัตว์ป่าในบ้าน
  adoption_advice: ควรรับจากฟาร์มที่ขึ้นทะเบียน — Sugar Glider จรจัดเยอะเพราะคนเลี้ยงไม่ไหว
  decision_factors: เลี้ยงอย่างน้อย 2 ตัวไหวไหม? อยู่ดึกพอที่จะเล่นกับมันไหม? พร้อมทำอาหารสดทุกวันไหม?

