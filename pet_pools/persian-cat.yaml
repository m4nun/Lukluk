agent_guidance:
  who_is_this_pet_for: Ideal for calm households, apartment dwellers, and people who want a low-energy, quiet companion. Perfect for people who enjoy grooming rituals and have time for daily coat care. Great for retirees and quiet professionals.
  hidden_costs: Professional grooming every 4-6 weeks, special eye cleaning products, air conditioning (they overheat easily), elevated food bowls for flat-faced cats.
  common_mistakes: Underestimating the daily grooming commitment. Not screening breeders for PKD. Assuming all cats are low-maintenance — Persians require significant daily care.
  adoption_advice: Many Persian cats are in breed-specific rescue. Insist on PKD screening from breeders. Look for "doll-face" Persians if you're concerned about extreme brachycephalic features.
  decision_factors: Can you commit to daily brushing? Are you willing to clean eyes daily? Do you have budget for professional grooming? Can you keep your home cool?

