concerns:
  - id: grooming
    title: Daily grooming required
    severity: major
    description: Their long coat mats easily without daily brushing. Professional grooming every 4-6 weeks is recommended. Matted fur causes skin problems and pain.
  - id: health_eyes
    title: Eye and breathing issues
    severity: moderate
    description: Flat-faced (brachycephalic) Persians are prone to eye discharge, tear staining, and breathing difficulties. Daily eye cleaning is necessary.
  - id: kidney_disease
    title: Risk of kidney disease
    severity: moderate
    description: Persians have a genetic predisposition to polycystic kidney disease (PKD). Reputable breeders screen for this. Annual blood work is recommended.

