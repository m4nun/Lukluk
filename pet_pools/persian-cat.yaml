id: persian-cat
name: Persian Cat
species: cat
breed_or_category: Persian
description: Calm, dignified, and luxurious. Persian cats are the aristocracy of the cat world — quiet, gentle, and perfectly content lounging in sunbeams.

mbti_label: ISFP — The Gentle Artist
mbti_traits:
  - Quiet and gentle
  - Affectionate on their terms
  - Predictable and routine-loving
  - Calm and dignified
mbti_description: Persian cats are the introverts who prefer peaceful environments and gentle attention. They are not demanding but appreciate quiet companionship. They thrive on routine and predictable, calm households.

