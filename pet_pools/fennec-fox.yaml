concerns:
  - id: legality
    title: ผิดกฎหมายในบางพื้นที่
    severity: major
    description: Fennec Fox ต้องมีใบอนุญาตในหลายประเทศและบางพื้นที่ห้ามเลี้ยงเด็ดขาด — ตรวจสอบกฎหมายก่อน
  - id: enclosure
    title: ต้องการกรงใหญ่และแน่นหนา
    severity: major
    description: Fennec Fox ขุดเก่งและปีนเก่ง — กรงต้องฝังลึก ปิดมิดชิด และแข็งแรง ไม่งั้นหนีแน่
  - id: noise
    title: เสียงดัง
    severity: moderate
    description: มีเสียงร้องหลายแบบทั้งเห่า หอน กรี๊ด — ไม่เหมาะกับคนชอบความเงียบ
  - id: exotic_vet
    title: ต้องการสัตว์แพทย์เฉพาะทาง
    severity: major
    description: หายากมากในไทย — ต้องหาสัตว์แพทย์ที่เชี่ยวชาญ exotic animals ก่อนตัดสินใจเลี้ยง

