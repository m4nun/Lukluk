agent_guidance:
  who_is_this_pet_for: คนมีประสบการณ์เลี้ยง exotic สูง, บ้านมีพื้นที่ในร่มและกลางแจ้ง, คนที่พร้อมใช้เวลาและเงินมหาศาล — ไม่เหมาะกับคนทั่วไป
  hidden_costs: ค่าใบอนุญาต, ค่ากรงขนาดใหญ่คุณภาพดี, exotic vet (แพงและหายาก), ค่าอาหารสด, ค่าดัดแปลงบ้าน
  common_mistakes: คิดว่าเลี้ยงง่ายเพราะตัวเล็ก, เลี้ยงในกรงเล็กหรือคอนโด, ไม่ศึกษากฎหมายก่อนซื้อ, ใช้สัตว์แพทย์ทั่วไป
  adoption_advice: ควรรับจากศูนย์ช่วยเหลือ exotic ที่ถูกกฎหมายเท่านั้น — ห้ามซื้อจากตลาดมืดหรือ smuggler
  decision_factors: ตรวจสอบกฎหมายในพื้นที่แล้วหรือยัง? หา exotic vet ได้ไหม? มีพื้นที่และเวลาเพียงพอหรือไม่? พร้อมรับผิดชอบ 10-14 ปีไหม? — Lukluk แนะนำให้พิจารณาสัตว์เลี้ยงอื่นที่เหมาะกับชีวิตคุณมากกว่า

