id: golden-retriever
name: Golden Retriever
species: dog
breed_or_category: Golden Retriever
description: Friendly, devoted, and intelligent. Golden Retrievers are the classic family companion — eager to please, great with children, and endlessly enthusiastic.

mbti_label: ESFJ — The Enthusiastic Companion
mbti_traits:
  - Outgoing and social
  - Loyal and devoted
  - Eager to please
  - Playful and energetic
mbti_description: Golden Retrievers are the extroverts of the dog world. They thrive on social interaction, bond deeply with their families, and approach life with joyful enthusiasm. They are people-pleasers who need to be part of family activities.

