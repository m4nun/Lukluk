agent_guidance:
  who_is_this_pet_for: Ideal for active families, first-time dog owners, and people who want a social, affectionate companion. Great for homes with children and other pets. Best for people who have time for daily exercise and don't mind regular grooming.
  hidden_costs: Professional grooming, pet insurance (strongly recommended due to breed health risks), replacement toys (they chew enthusiastically), doggy daycare if you work long hours.
  common_mistakes: Underestimating the exercise needs — a bored Golden becomes destructive. Not budgeting for health issues. Letting them get overweight (they love food). Not socializing them early enough.
  adoption_advice: Look for reputable breeders who screen for hip/elbow dysplasia and eye conditions. Many Golden Retrievers are available through rescue organizations. Always meet the parents if possible.
  decision_factors: Can you commit to 45-90 minutes of daily exercise? Do you have budget for potential health costs? Are you okay with constant shedding? Is someone home most of the day?

