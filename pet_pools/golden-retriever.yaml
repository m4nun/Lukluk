concerns:
  - id: shedding
    title: Heavy shedding year-round
    severity: moderate
    description: Golden Retrievers shed consistently with seasonal heavy shedding. Expect fur on furniture, clothes, and floors. Not suitable for people who prefer a fur-free home.
  - id: exercise_needs
    title: High exercise requirements
    severity: moderate
    description: Need 45-90 minutes of active exercise daily. Without it, they may become destructive or anxious. A tired Golden is a happy Golden.
  - id: separation_anxiety
    title: Prone to separation anxiety
    severity: minor
    description: Being left alone for long hours can cause distress. Best suited for households where someone is home most of the day or where doggy daycare is an option.
  - id: health_cost
    title: Higher-than-average medical costs
    severity: moderate
    description: Golden Retrievers have a higher cancer rate and are prone to joint issues. Pet insurance or a medical savings fund is strongly recommended.

