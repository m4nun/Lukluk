agent_guidance:
  who_is_this_pet_for: Perfect for apartment dwellers, low-energy households, and people who want a calm, loyal companion without intense exercise demands. Ideal for retirees and homebodies. Great with children (patient and sturdy).
  hidden_costs: Pet insurance or substantial medical savings (essential), air conditioning costs, special cleaning wipes for skin folds, special bowls for flat-faced dogs.
  common_mistakes: Not budgeting for medical costs. Exercising in heat. Overfeeding (they gain weight easily). Not cleaning skin folds regularly. Buying from irresponsible breeders.
  adoption_advice: Find a breeder who screens for brachycephalic and joint issues. Bulldog rescues exist but dogs often have pre-existing health conditions. Expect higher-than-average lifetime medical costs regardless of source.
  decision_factors: Can you afford potentially high medical bills? Do you have air conditioning? Are you okay with a shorter companionship (8-10 years)? Can you commit to regular skin fold cleaning?

