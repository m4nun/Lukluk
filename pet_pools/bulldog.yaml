id: bulldog
name: Buff Bulldog
species: dog
breed_or_category: Bulldog
description: Laid-back, courageous, and affectionate. Bulldogs are the ultimate couch companion — low-energy, loyal, and endlessly charming despite their grumpy faces.

mbti_label: ISTP — The Relaxed Guardian
mbti_traits:
  - Calm and steady
  - Loyal and protective
  - Stubborn but loving
  - Low-energy and content
mbti_description: Bulldogs are the introverts of the dog world. They value comfort above all else, form strong bonds with their family, and approach life at their own deliberate pace. They are stubborn but deeply affectionate.

