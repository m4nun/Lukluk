concerns:
  - id: health_cost
    title: High medical costs
    severity: major
    description: Bulldogs are prone to numerous health issues — breathing problems, skin infections, joint issues, and eye problems. Veterinary costs can easily exceed 20,000 THB annually.
  - id: heat_sensitivity
    title: Cannot tolerate heat
    severity: major
    description: Their flat faces make Bulldogs extremely heat-sensitive. In Thailand's climate, air conditioning is essential. Outdoor time must be limited during hot hours.
  - id: lifespan
    title: Short lifespan
    severity: moderate
    description: Bulldogs typically live only 8-10 years. The emotional cost of a shorter companionship should be considered.

