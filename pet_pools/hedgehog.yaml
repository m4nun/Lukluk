id: hedgehog
name: Hedgehog
species: other
breed_or_category: African Pygmy Hedgehog
description: สัตว์เงียบ ๆ หนามนิ่ม — Hedgehog เป็นเพื่อนเล็ก ๆ ที่ชอบอยู่คนเดียว แต่ถ้าคุ้นแล้วจะน่ารักและขี้เล่นมาก

mbti_label: INTP — The Quiet Explorer
mbti_traits:
  - ชอบอยู่คนเดียว
  - นิสัยเฉพาะตัว
  - ขี้สงสัยตอนกลางคืน
  - ไว้ใจยากแต่ไว้ใจแล้วรักเลย
mbti_description: Hedgehog เป็น introvert ตัวจริง — มันต้องการเวลาในการไว้ใจเจ้าของ เมื่อไว้ใจแล้วมันจะคลายหนามและให้คุณจับได้ แต่มันก็ยังต้องการเวลาส่วนตัวอยู่ดี

appearance:
  size: small
  weight_range_kg: [0.25, 0.5]
  lifespan_years: [4, 6]
  coat_type: quills (spines)

budget:
  initial_cost_thb: [3000, 8000]
  monthly_cost_thb: [500, 1500]
  annual_medical_thb: [3000, 8000]
  budget_tier: low

time:
