id: siamese-cat
name: Siamese Cat
species: cat
breed_or_category: Siamese
description: Elegant, vocal, and intensely social. Siamese cats form deep bonds with their humans and demand to be part of every conversation.

mbti_label: ENFJ — The Charismatic Companion
mbti_traits:
  - Vocal and communicative
  - Highly social
  - Intelligent and curious
  - Demanding of attention
mbti_description: Siamese cats are the extroverts of the feline world. They talk constantly, follow you everywhere, and treat your home as their stage. They need companionship and mental stimulation — a lonely Siamese is a loud, unhappy Siamese.

