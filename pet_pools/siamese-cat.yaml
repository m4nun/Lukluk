concerns:
  - id: vocalization
    title: Extremely vocal
    severity: major
    description: Siamese cats are famous for their loud, persistent meowing. They will talk to you constantly. Not suitable for noise-sensitive households or apartments with thin walls.
  - id: attention_needs
    title: High attention demands
    severity: moderate
    description: Siamese cats need significant daily interaction. They follow you everywhere and may become destructive or depressed if ignored. Consider two cats if you work long hours.
  - id: nocturnal
    title: May be active at night
    severity: minor
    description: Siamese cats can be nocturnal vocalizers. Evening play sessions help but may not eliminate nighttime activity.

