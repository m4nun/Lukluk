agent_guidance:
  who_is_this_pet_for: Perfect for people who want an interactive, talkative companion. Ideal for homes where someone is around often — retirees, work-from-home professionals, or families with older children. Great for cat lovers who want a "dog-like" cat.
  hidden_costs: Cat trees and climbing furniture (they need vertical space), puzzle toys for mental stimulation, potential dental care costs, a second cat as companion if you're away often.
  common_mistakes: Getting a Siamese when you want a quiet, independent cat. Leaving them alone for long hours. Not providing enough vertical space and enrichment. Underestimating their intelligence — they learn to open doors and cabinets.
  adoption_advice: Many Siamese cats and mixes are in rescue. Purebred Siamese from breeders should have health screening for eye and dental issues. The traditional "apple-head" Siamese tends to be quieter than the modern "wedge-head" type.
  decision_factors: Can you handle constant vocalization? Is someone home most of the day? Do you have patience for a demanding, intelligent companion? Are your walls thick enough for apartment living?

