agent_guidance:
  who_is_this_pet_for: มือใหม่, คนอยู่คอนโด, คนที่ชอบดูสัตว์เล่นกัน, คนที่อยากได้สัตว์เลี้ยงที่ไม่ส่งเสียงตอนกลางคืน — Gerbil active ตอนกลางวัน!
  hidden_costs: ของเล่นสำหรับขุด, วัสดุรองกรงจำนวนมาก
  common_mistakes: เลี้ยงตัวเดียว, วัสดุรองกรงตื้นเกิน, จับหาง (หางหลุด!)
  adoption_advice: Gerbil ออกลูกเร็ว — ถ้าเลี้ยงตัวผู้ตัวเมียรวมกันจะได้อีก 10 ตัวฟรี
  decision_factors: เลี้ยง 2 ตัวไหวไหม? มีที่ให้วัสดุรองกรงลึก 15-20 ซม. ไหม?

