id: gerbil
name: Gerbil
species: other
breed_or_category: Mongolian Gerbil
description: หนูน้อยพลังงานสูง — Gerbil เป็นสัตว์ที่แอคทีฟ ขุดเก่ง และชอบเล่นกับเพื่อน gerbil ด้วยกัน สนุกมากกว่าที่เห็น

mbti_label: ESTP — The Energetic Digger
mbti_traits:
  - แอคทีฟและขุดเก่ง
  - สังคม (ต้องเลี้ยงคู่)
  - อยากรู้อยากเห็น
  - เลี้ยงง่าย
mbti_description: Gerbil เป็นสัตว์สังคมตัวน้อยที่ไม่เคยหยุดนิ่ง — มันขุดอุโมงค์ซับซ้อน วิ่งเล่นกับเพื่อน และสำรวจทุกสิ่งในกรง พวกมันน่าสนใจกว่าที่หลายคนคิด

