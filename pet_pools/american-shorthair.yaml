agent_guidance:
  who_is_this_pet_for: แมวที่เหมาะกับทุกคน — มือใหม่, คนทำงาน, ครอบครัวมีเด็ก, บ้านมีสัตว์อื่น, คนอยู่คอนโด — American Shorthair ปรับตัวได้กับทุกสถานการณ์
  hidden_costs: ค่าอาหารคุณภาพดี (เนื่องจากกินง่าย เลือกของดีได้ไม่ต้องเปลี่ยนบ่อย), ค่าทำฟันประจำปี
  common_mistakes: ให้อาหารมากเกินจนอ้วน, ไม่แปรงขนเพราะคิดว่าขนสั้นไม่ต้องดูแล
  adoption_advice: American Shorthair มีทั้งสายพันธุ์แท้และแมวบ้านหน้าตาคล้ายกันมาก — แมวบ้านสุขภาพดีกว่าพันธุ์แท้หลายตัว
  decision_factors: อยากได้แมวที่เลี้ยงง่าย, ไม่มีปัญหาพฤติกรรม, เข้ากับทุกคนในบ้าน — American Shorthair คือคำตอบ

