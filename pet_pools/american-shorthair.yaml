id: american-shorthair
name: Cool Cat Shorthair
species: cat
breed_or_category: American Shorthair
description: แมวอารมณ์ดี เลี้ยงง่ายที่สุดในบรรดาแมวพันธุ์แท้ — American Shorthair ขี้เล่นแต่ไม่วุ่นวาย ติดเจ้าของแต่ไม่เรียกร้องมากเกิน

mbti_label: ISTJ — The Steady Companion
mbti_traits:
  - อารมณ์ดี สม่ำเสมอ
  - ขี้เล่นกำลังดี
  - ปรับตัวเก่ง
  - ไม่ติดคนมากเกินไป
mbti_description: American Shorthair คือแมวที่เข้าใจง่ายที่สุด — พวกมันอารมณ์คงที่ ไม่เหวี่ยง ไม่ทำลายข้าวของ ขอแค่มีอาหารดี ๆ และที่นอนอุ่น ๆ ก็พอใจแล้ว พวกมันเป็นเพื่อนที่อยู่ด้วยแล้วสบายใจ

